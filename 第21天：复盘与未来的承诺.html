<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>第 21 天 · 复盘与未来的承诺</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; overflow: hidden; background: radial-gradient(circle at top, #fffaf0, #f6e7d5 40%, #f2decc 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; color: #5d4a3d; }
        .page { position: relative; width: 100vw; height: 100vh; }
        .scene { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; padding: 2rem 1.4rem; opacity: 0; visibility: hidden; transition: opacity 0.6s ease, visibility 0.6s ease; }
        .scene.active { opacity: 1; visibility: visible; }
        .container { width: min(100%, 360px); }
        .pill { display: inline-flex; align-items: center; justify-content: center; padding: 0.6rem 1.05rem; background: rgba(255,247,235,0.52); border: 1px solid rgba(217,189,161,0.2); border-radius: 999px; font-size: 0.84rem; color: #8a6d57; margin-bottom: 1.2rem; }
        .card { background: rgba(255,255,255,0.58); border: 1px solid rgba(255,255,255,0.4); border-radius: 24px; padding: 1.5rem; box-shadow: 0 18px 60px rgba(138,109,87,0.11); backdrop-filter: blur(14px); }
        .title { font-weight: 700; font-size: 1.55rem; line-height: 1.3; margin-bottom: 0.4rem; color: #6c4d34; }
        .subtitle { font-size: 0.92rem; line-height: 1.6; color: #8a6d57; margin-bottom: 1.2rem; }
        .step-text { font-size: 0.98rem; line-height: 1.7; color: #5d4a3d; margin-bottom: 1.2rem; }
        .button { width: 100%; padding: 0.98rem 1.2rem; border: none; border-radius: 999px; background: linear-gradient(135deg, #8d6b4d, #a78267); color: #fff; font-size: 0.98rem; font-weight: 700; box-shadow: 0 10px 24px rgba(141,107,77,0.28); cursor: pointer; }
        .button:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
        .guided-overlay { position: fixed; inset: 0; background: rgba(68,47,32,0.58); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.35s ease, visibility 0.35s ease; }
        .guided-overlay.active { opacity: 1; visibility: visible; }
        .guided-card { width: min(88vw, 320px); background: linear-gradient(180deg, #fffaf4, #fff4e6); border-radius: 24px; padding: 1.4rem; box-shadow: 0 24px 50px rgba(72,47,29,0.26); text-align: center; }
        .guided-title { font-size: 1.16rem; font-weight: 700; color: #6d4a31; margin-bottom: 0.4rem; }
        .guided-desc { font-size: 0.84rem; line-height: 1.5; color: #8a6d57; margin-bottom: 1rem; }
        .guided-time { font-size: 2.3rem; font-weight: 800; letter-spacing: 0.08em; color: #6d4a31; margin-bottom: 1rem; }
        .input { width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid #ebddcd; background: #fffdfa; font-size: 0.86rem; outline: none; margin-bottom: 0.8rem; }
        .input:focus { border-color: #c9a687; }
        .summary-card { padding: 1.3rem; border-radius: 20px; background: #fffdf9; border: 1px solid #f6ebde; }
        .summary-block { margin-bottom: 1rem; padding: 0.9rem; background: #fff7ef; border-radius: 14px; }
        .summary-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #b08d73; margin-bottom: 0.4rem; }
        .summary-content { font-size: 0.92rem; line-height: 1.6; color: #5d4a3d; }
    </style>
</head>
<body>
    <div id="guidedOverlay" class="guided-overlay" aria-hidden="true">
        <div class="guided-card" role="dialog" aria-modal="true" aria-labelledby="guidedTitle">
            <div id="guidedTitle" class="guided-title">3分钟 54321 五感练习</div>
            <div id="guidedDesc" class="guided-desc">请看见五样你能看到的东西，感受四样你能触碰到的东西，听见三样声音，觉察两样气味，最后留意一种味道。</div>
            <div id="guidedTime" class="guided-time">03:00</div>
            <button id="guidedContinueBtn" class="button" disabled>请完成 3 分钟</button>
        </div>
    </div>

    <main class="page">
        <section id="scene-1" class="scene active">
            <div class="container">
                <div class="pill">第 21 天 · 10分钟练习</div>
                <div class="card">
                    <div class="title">复盘与未来的承诺</div>
                    <div class="subtitle">今天不是结束，是把这些练习变成你可以延续的生活方式。</div>
                    <div class="step-text">请先完成一次 3 分钟 54321 五感练习，然后写下你未来愿意守住的承诺。</div>
                    <button class="button" onclick="startGuidedSession('fiveSenses', () => goToScene('scene-2'))">开始 3 分钟 54321 五感练习</button>
                </div>
            </div>
        </section>

        <section id="scene-2" class="scene">
            <div class="container">
                <div class="pill">步骤 2 / 3 · 承诺</div>
                <div class="card">
                    <div class="step-text">在未来的一段时间里，你愿意对自己做出哪一个可执行的承诺？</div>
                    <input id="promiseInput" class="input" placeholder="例如：每周三次做 3 分钟自我照顾练习" />
                    <button class="button" onclick="savePromise()">保存承诺</button>
                </div>
            </div>
        </section>

        <section id="scene-3" class="scene">
            <div class="container">
                <div class="pill">步骤 3 / 3 · 温柔复盘</div>
                <div class="card summary-card">
                    <div class="summary-title">你的专属心灵档案</div>
                    <div class="summary-block">
                        <div class="summary-label">未来承诺</div>
                        <div id="summaryPromise" class="summary-content">——</div>
                    </div>
                    <div class="summary-block">
                        <div class="summary-label">新的认知</div>
                        <div class="summary-content">我已经学会照顾自己，并且可以把这份能力带入未来。</div>
                    </div>                    <div class="summary-block">
                        <div class="summary-label">总结模块</div>
                        <div class="summary-content">你刚刚完成了：本页练习的关键步骤与自我确认。</div>
                    </div>
                    <button class="button" onclick="restartFlow()">完成今天的练习</button>




                </div>
            </div>
        </section>
    </main>

    <script>
        function speak(text) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=0.95; u.pitch=1.02; u.volume=1; window.speechSynthesis.speak(u); }
        function goToScene(sceneId) { document.querySelectorAll('.scene').forEach(s => s.classList.remove('active')); document.getElementById(sceneId).classList.add('active'); }
        function startGuidedSession(type, onComplete) {
            const sessions = { fiveSenses: { title: '3分钟 5,4,3,2,1, 五感练习', desc: '请看见五样你能看到的东西，感受四样你能触碰到的东西，听见三样声音，觉察两样气味，最后留意一种味道。', script: '现在开始三分钟 54321 五感练习。请看见五样你能看到的东西，感受四样你能触碰到的东西，听见三样声音，觉察两样气味，最后留意一种味道。', duration: 180 } };
            const session = sessions[type];
            const overlay = document.getElementById('guidedOverlay');
            const titleEl = document.getElementById('guidedTitle');
            const descEl = document.getElementById('guidedDesc');
            const timeEl = document.getElementById('guidedTime');
            const continueBtn = document.getElementById('guidedContinueBtn');
            titleEl.textContent = session.title;
            descEl.textContent = session.desc;
            overlay.classList.add('active');
            continueBtn.disabled = true;
            continueBtn.textContent = '请完成 3 分钟';
            timeEl.textContent = '03:00';
            speak(session.script);
            let remaining = session.duration;
            const timer = setInterval(() => {
                remaining -= 1;
                const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
                const secs = String(remaining % 60).padStart(2, '0');
                timeEl.textContent = `${mins}:${secs}`;
                if (remaining <= 0) {
                    clearInterval(timer);
                    overlay.classList.remove('active');
                    speak('三分钟已完成，你可以继续下一步。');
                    continueBtn.disabled = false;
                    continueBtn.textContent = '继续';
                    if (typeof onComplete === 'function') onComplete();
                }
            }, 1000);
        }
        function savePromise() {
            const promise = document.getElementById('promiseInput').value.trim() || '每周至少做三次自我照顾';
            document.getElementById('summaryPromise').textContent = promise;
            speak('承诺已经保存。');
            goToScene('scene-3');
        }
        function restartFlow() {
            const dayMatch = document.title.match(/第\s*(\d+)\s*天/);
            if (dayMatch) {
                localStorage.setItem('act21_day_' + dayMatch[1], 'done');
                localStorage.setItem('act21_lastCompletedAt', new Date().toISOString());
            }
            document.getElementById('promiseInput').value = '';
            document.getElementById('summaryPromise').textContent = '——';
            goToScene('scene-1');
        }
        window.onload = function() { speak('第 21 天，今天的练习是复盘与未来的承诺。请先完成 3 分钟 54321 五感练习，然后写下承诺。'); };
    </script>
</body>
</html>
